  # ENABLE_PACKAGE_UPLOAD: "true"
  # RUN_CD: "true"

ci:build:
  stage: ci
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "TODO: build CI image (devops/ci.Dockerfile)"
    - echo "TODO: make lint/test inside CI image"
    - echo "TODO: docker build -t $IMAGE_NAME --build-arg VERSION=... -f devops/Dockerfile ."
    - echo "TODO: optional upload jar to GitLab Package Registry"
    - echo "TODO: optional push to GitLab Container Registry"

cd:deploy:
  stage: cd
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$RUN_CD == "true"'
      variables:
        ENV_NAME: "DEV"
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "master"'
      variables:
        ENV_NAME: "PRO"
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "develop"'
      variables:
        ENV_NAME: "DEV"
      when: on_success
    - when: never
  environment:
    name: $ENV_NAME
  script:
    - echo "TODO: docker pull from GitLab registry + tag + compose up + logs"
  after_script:
    - echo "TODO: cleanup"
